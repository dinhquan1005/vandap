<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kho Dữ Liệu</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  </head>
  <body>

    <canvas id="matrix-canvas"></canvas>
    <div class="cursor-glow"></div>
    
    <main class="container">
      <div class="container-content">
        <div class="mode hover-sparkle">VẤN ĐÁP</div>

        <div class="input-group">
          <input type="text" id="searchInput" placeholder="Nhập để tìm kiếm..." />
        </div>

        <div id="loading-spinner" class="spinner-hidden">
          <div class="spinner"></div>
        </div>

        <div class="table-wrapper">
          <table>
            <tbody id="questionTable"></tbody>
          </table>
        </div>

        <p id="footer-text" class="hover-sparkle">KIẾM KHÍ TRƯỜNG THÀNH</p>
      </div>
    </main>

    <script src="js.js"></script>
  </body>
</html>
